version: "3.9"

services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: safepulse
      POSTGRES_PASSWORD: safepulse
      POSTGRES_DB: safepulse
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build: ./backend
    ports:
      - "8000:8000"
    env_file: ./backend/.env
    depends_on:
      - db
      - redis
    volumes:
      - ./backend:/app

  celery:
    build: ./backend
    command: celery -A app.tasks.celery_app worker --loglevel=info
    env_file: ./backend/.env
    depends_on:
      - db
      - redis

volumes:
  pgdata:
